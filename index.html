<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思考框架圖書館</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent-munger: #f59e0b;
    --accent-feynman: #3b82f6;
    --accent-taleb: #ef4444;
    --accent-meadows: #10b981;
    --accent-active: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 20px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
    font-size: 20px;
  }

  /* Header */
  .header {
    padding: 2.5rem 2rem 1.5rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #161825 0%, var(--bg) 100%);
  }
  .header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 0.5rem;
  }
  .header p {
    color: var(--text-dim);
    font-size: 1.05rem;
  }

  /* Search */
  .search-wrap {
    max-width: 560px;
    margin: 1.5rem auto 0;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
  }
  #search {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.6rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 1.05rem;
    outline: none;
    transition: border-color .2s;
  }
  #search:focus { border-color: var(--accent-active); }
  #search::placeholder { color: var(--text-dim); }

  /* Layout */
  .container {
    display: flex;
    max-width: 1280px;
    margin: 0 auto;
    min-height: calc(100vh - 180px);
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-section {
    margin-bottom: 1.2rem;
  }
  .sidebar-section-title {
    padding: 0 1.2rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }
  .thinker-btn {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    width: 100%;
    padding: 0.6rem 1.2rem;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    transition: background .15s;
    text-align: left;
  }
  .thinker-btn:hover { background: var(--surface); }
  .thinker-btn.active { background: var(--surface2); font-weight: 600; }
  .thinker-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .framework-link {
    display: block;
    padding: 0.4rem 1.2rem 0.4rem 2.6rem;
    font-size: 0.92rem;
    color: var(--text-dim);
    text-decoration: none;
    cursor: pointer;
    transition: color .15s, background .15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .framework-link:hover { color: var(--text); background: var(--surface); }
  .framework-link.active { color: var(--accent-active); }

  /* Main content */
  .main {
    flex: 1;
    padding: 2rem 2.5rem;
    overflow-y: auto;
    max-height: 100vh;
  }

  /* Thinker header card */
  .thinker-header {
    padding: 2rem;
    border-radius: 14px;
    border: 1px solid var(--border);
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  .thinker-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .thinker-header h2 {
    font-size: 1.8rem;
    margin-bottom: 0.3rem;
  }
  .thinker-header .quote {
    font-style: italic;
    color: var(--text-dim);
    font-size: 1.02rem;
    margin-bottom: 1rem;
    padding-left: 1rem;
    border-left: 2px solid var(--border);
  }
  .thinker-header .philosophy {
    font-size: 1.02rem;
    color: var(--text-dim);
    line-height: 1.8;
  }

  /* Framework cards */
  .framework-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.8rem;
    margin-bottom: 1.5rem;
    transition: border-color .2s;
  }
  .framework-card:hover { border-color: #3e4460; }
  .framework-card h3 {
    font-size: 1.3rem;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .framework-card h3 .num {
    font-size: 0.75rem;
    padding: 0.15rem 0.55rem;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text-dim);
  }
  .framework-card p {
    font-size: 1.02rem;
    margin-bottom: 0.8rem;
    color: var(--text);
    line-height: 1.8;
  }
  .framework-card .subtitle {
    font-weight: 600;
    font-size: 1rem;
    margin: 1rem 0 0.4rem;
    color: var(--text);
  }
  .framework-card ul {
    padding-left: 1.2rem;
    margin-bottom: 0.8rem;
  }
  .framework-card li {
    font-size: 1rem;
    margin-bottom: 0.4rem;
    color: var(--text);
    line-height: 1.7;
  }
  .framework-card table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.8rem 0;
    font-size: 0.95rem;
  }
  .framework-card th {
    text-align: left;
    padding: 0.5rem 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.95rem;
  }
  .framework-card td {
    padding: 0.5rem 0.8rem;
    border: 1px solid var(--border);
    font-size: 0.95rem;
  }

  /* Usage table */
  .usage-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.8rem;
    margin-bottom: 1.5rem;
  }
  .usage-card h3 { font-size: 1.05rem; margin-bottom: 1rem; }

  /* Tag for cross-reference */
  .tag {
    display: inline-block;
    font-size: 0.72rem;
    padding: 0.15rem 0.5rem;
    border-radius: 5px;
    margin-left: 0.3rem;
    vertical-align: middle;
  }

  /* Search highlight */
  mark {
    background: rgba(167, 139, 250, 0.3);
    color: var(--text);
    border-radius: 2px;
    padding: 0 2px;
  }

  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .container { flex-direction: column; }
    .sidebar {
      width: 100%;
      height: auto;
      position: static;
      border-right: none;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      padding: 1rem;
      gap: 0.5rem;
    }
    .sidebar-section { margin-bottom: 0; }
    .sidebar-section-title { display: none; }
    .framework-link { display: none; }
    .thinker-btn { width: auto; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border); }
    .thinker-btn.active { background: var(--surface2); border-color: var(--accent-active); }
    .main { padding: 1.5rem; max-height: none; }
  }
</style>
</head>

let currentThinker = DATA[0];
let searchTerm = '';

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlight(text) {
  if (!searchTerm) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return escaped.replace(regex, '<mark>$1</mark>');
}

function textMatches(text) {
  if (!searchTerm) return true;
  return text.toLowerCase().includes(searchTerm.toLowerCase());
}

function thinkerMatches(t) {
  if (!searchTerm) return true;
  const s = searchTerm.toLowerCase();
  if (t.name.toLowerCase().includes(s)) return true;
  if (t.philosophy.toLowerCase().includes(s)) return true;
  if (t.quote.toLowerCase().includes(s)) return true;
  for (const f of t.frameworks) {
    if (f.title.toLowerCase().includes(s) || (f.subtitle||'').toLowerCase().includes(s) || f.content.toLowerCase().includes(s)) return true;
    if (f.why && f.why.toLowerCase().includes(s)) return true;
    if (f.application && f.application.toLowerCase().includes(s)) return true;
    if (f.steps && f.steps.some(st => st.toLowerCase().includes(s))) return true;
    if (f.examples && f.examples.some(e => e.toLowerCase().includes(s))) return true;
    if (f.biases && f.biases.some(b => b.name.toLowerCase().includes(s) || b.desc.toLowerCase().includes(s))) return true;
    if (f.principles && f.principles.some(p => p.toLowerCase().includes(s))) return true;
    if (f.archetypes && f.archetypes.some(a => a.name.toLowerCase().includes(s) || a.desc.toLowerCase().includes(s))) return true;
  }
  for (const u of t.usageTable) {
    if (u.situation.toLowerCase().includes(s) || u.frameworks.toLowerCase().includes(s)) return true;
  }
  return false;
}

function frameworkMatches(f) {
  if (!searchTerm) return true;
  const s = searchTerm.toLowerCase();
  const texts = [f.title, f.subtitle||'', f.content, f.why||'', f.application||''];
  if (f.steps) texts.push(...f.steps);
  if (f.examples) texts.push(...f.examples);
  if (f.biases) f.biases.forEach(b => texts.push(b.name, b.desc));
  if (f.principles) texts.push(...f.principles);
  if (f.archetypes) f.archetypes.forEach(a => texts.push(a.name, a.desc, a.tip));
  return texts.some(t => t.toLowerCase().includes(s));
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="sidebar-section"><div class="sidebar-section-title">思想家</div>';
  for (const t of DATA) {
    const matched = thinkerMatches(t);
    if (searchTerm && !matched) continue;
    const active = t.id === currentThinker.id ? ' active' : '';
    html += `<button class="thinker-btn${active}" data-id="${t.id}"><span class="thinker-dot" style="background:${t.color}"></span>${t.name}</button>`;
    if (t.id === currentThinker.id) {
      for (let i = 0; i < t.frameworks.length; i++) {
        const f = t.frameworks[i];
        if (searchTerm && !frameworkMatches(f)) continue;
        html += `<button class="framework-link" data-idx="${i}">${f.title}</button>`;
      }
    }
  }
  html += '</div>';
  sb.innerHTML = html;

  sb.querySelectorAll('.thinker-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentThinker = DATA.find(t => t.id === btn.dataset.id);
      render();
    });
  });
  sb.querySelectorAll('.framework-link').forEach(btn => {
    btn.addEventListener('click', () => {
      const el = document.getElementById('fw-' + btn.dataset.idx);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

function renderCrossRefs(refs) {
  if (!refs || !refs.length) return '';
  return refs.map(r => `<span class="tag" style="background:${DATA.find(t=>t.name.includes(r.name))?.color||'#666'}22;color:${DATA.find(t=>t.name.includes(r.name))?.color||'#888'}">${r.name} · ${r.tag}</span>`).join(' ');
}

function renderFramework(f, idx) {
  let html = `<div class="framework-card" id="fw-${idx}">`;
  html += `<h3><span class="num">${idx+1}</span> ${highlight(f.title)}`;
  if (f.subtitle) html += ` <span style="color:var(--text-dim);font-weight:400;font-size:0.95rem">${highlight(f.subtitle)}</span>`;
  html += `</h3>`;
  html += `<p>${highlight(f.content)}</p>`;

  if (f.threeTypes) {
    html += '<table><tr><th>類型</th><th>特性</th><th>比喻</th></tr>';
    f.threeTypes.forEach(t => { html += `<tr><td>${highlight(t.type)}</td><td>${highlight(t.trait)}</td><td>${highlight(t.metaphor)}</td></tr>`; });
    html += '</table>';
  }
  if (f.keyModels) {
    html += '<table><tr><th>學科</th><th>重要模型</th></tr>';
    f.keyModels.forEach(m => { html += `<tr><td>${highlight(m.field)}</td><td>${highlight(m.models)}</td></tr>`; });
    html += '</table>';
  }
  if (f.twoLoops) {
    f.twoLoops.forEach(l => {
      html += `<div class="subtitle">${highlight(l.type)}</div><p>${highlight(l.desc)}</p>`;
      html += `<ul><li>正面：${highlight(l.posEx)}</li><li>負面：${highlight(l.negEx)}</li><li>特徵：${highlight(l.trait)}</li></ul>`;
    });
  }
  if (f.leverageLevels) {
    html += '<table><tr><th>層級</th><th>介入方式</th><th>備註</th></tr>';
    f.leverageLevels.forEach(l => { html += `<tr><td>${highlight(l.level)}</td><td>${highlight(l.desc)}</td><td>${highlight(l.note)}</td></tr>`; });
    html += '</table>';
  }
  if (f.archetypes) {
    f.archetypes.forEach(a => {
      html += `<div class="subtitle">${highlight(a.name)}</div><p>${highlight(a.desc)}</p><p style="color:var(--text-dim);font-size:0.95rem">💡 ${highlight(a.tip)}</p>`;
    });
  }
  if (f.biases) {
    f.biases.forEach(b => {
      html += `<div class="subtitle">${highlight(b.name)}</div><p>${highlight(b.desc)}</p>`;
    });
  }
  if (f.steps) {
    html += '<ul>';
    f.steps.forEach(s => { html += `<li>${highlight(s)}</li>`; });
    html += '</ul>';
  }
  if (f.examples) {
    html += `<div class="subtitle">範例</div><ul>`;
    f.examples.forEach(e => { html += `<li>${highlight(e)}</li>`; });
    html += '</ul>';
  }
  if (f.principles) {
    html += '<ul>';
    f.principles.forEach(p => { html += `<li>${highlight(p)}</li>`; });
    html += '</ul>';
  }
  if (f.why) html += `<p style="color:var(--text-dim);font-size:1rem;margin-top:0.5rem"><strong>為什麼有效：</strong>${highlight(f.why)}</p>`;
  if (f.application) html += `<p style="color:var(--text-dim);font-size:1rem"><strong>應用：</strong>${highlight(f.application)}</p>`;
  if (f.crossRef) html += `<div style="margin-top:0.8rem">↔ ${renderCrossRefs(f.crossRef)}</div>`;
  html += '</div>';
  return html;
}

function renderMain() {
  const main = document.getElementById('main');
  const t = currentThinker;

  if (searchTerm && !thinkerMatches(t)) {
    const match = DATA.find(d => thinkerMatches(d));
    if (match) { currentThinker = match; renderSidebar(); renderMain(); return; }
    main.innerHTML = '<div class="no-results">沒有找到符合的結果，試試其他關鍵字？</div>';
    return;
  }

  let html = `<div class="thinker-header" style="background:${t.color}08">
    <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${t.color}"></div>
    <h2>${highlight(t.name)}</h2>
    <div class="quote">「${highlight(t.quote)}」${t.quoteSource ? ' — ' + highlight(t.quoteSource) : ''}</div>
    <div class="philosophy">${highlight(t.philosophy)}</div>
  </div>`;

  t.frameworks.forEach((f, i) => {
    if (searchTerm && !frameworkMatches(f)) return;
    html += renderFramework(f, i);
  });

  html += `<div class="usage-card"><h3>日常應用速查</h3><table><tr><th>情境</th><th>適用框架</th></tr>`;
  t.usageTable.forEach(u => {
    if (searchTerm && !textMatches(u.situation) && !textMatches(u.frameworks)) return;
    html += `<tr><td>${highlight(u.situation)}</td><td>${highlight(u.frameworks)}</td></tr>`;
  });
  html += '</table></div>';

  main.innerHTML = html;
}

function render() { renderSidebar(); renderMain(); }

document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim();
  render();
});

render();
</script>
</body>
</html>
